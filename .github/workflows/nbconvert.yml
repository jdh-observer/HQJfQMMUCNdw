on: [workflow_dispatch]

name: GitHub Actions for nbconvert
jobs:
  nbconvert:
    runs-on: ubuntu-latest
    name: nbconvert
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: fetch large files from original repo if needed
        shell: bash
        run: |
          TARGET_FILE="media/jdh_ohtm_pipeline_final_version.ohtm"
          LFS_OID="7324463351d88933d26c7a3cef49a83f30a0eb2243fc06801bffbff550e74c7b"
          LFS_SIZE="364805792"
          LFS_API="https://github.com/bayerschphi/OHTM-a-oral-history-topic-modeling-pipeline.git/info/lfs/objects/batch"

          echo "Requesting LFS download URL from upstream..."
          RESPONSE=$(curl -s -X POST \
            -H "Accept: application/vnd.git-lfs+json" \
            -H "Content-Type: application/vnd.git-lfs+json" \
            "$LFS_API" \
            -d "{\"operation\":\"download\",\"transfers\":[\"basic\"],\"objects\":[{\"oid\":\"$LFS_OID\",\"size\":$LFS_SIZE}]}")

          echo "LFS API response: $RESPONSE"

          DOWNLOAD_URL=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(data['objects'][0]['actions']['download']['href'])
")
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o "$TARGET_FILE" "$DOWNLOAD_URL"

          # Fail fast if replacement did not succeed.
          if head -n 1 "$TARGET_FILE" | grep -q "version https://git-lfs.github.com/spec/v1"; then
            echo "ERROR: $TARGET_FILE is still an LFS pointer after download."
            exit 1
          fi
          echo "Successfully fetched real .ohtm file ($(wc -c < $TARGET_FILE) bytes)"

      - name: deleting nbconvert branch if exists
        shell: bash
        run: |
          git push origin -d nbconvert &>/dev/null || true 
      
      - name: extracting branch name & creating the new nbconvert branch
        shell: bash
        run: |
          echo "GitHub reft_name ${{ github.ref_name }}"
          git checkout -b nbconvert
          git push -u origin nbconvert
        id: extract_branch
      - name: retreiving name of the article
        id: getfile
        run: |
          FIRST_FILE=$(ls *.ipynb | sort | head -n 1)
          echo "article name is: $FIRST_FILE"
          echo "FIRST_IPYNB_FILE=$FIRST_FILE" >> $GITHUB_ENV
      - name: Extract Python version from runtime.txt
        id: get_python_version
        run: |
          # reading runtime.txt and removing the "python-" prefix
          PYTHON_VERSION=$(sed 's/^python-//' runtime.txt)
          echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.get_python_version.outputs.python_version }}
      - name: installing nbconvert & other required libraries
        run: |
          pip install -r requirements.txt
          python -m pip install jupyter nbconvert nbformat notebook 
      - name: running nbconvert
        run: |
          jupyter nbconvert --execute --to notebook --inplace --ExecutePreprocessor.timeout=-1 $FIRST_IPYNB_FILE

      - name: committing changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Automated commit
          branch: nbconvert
          create_branch: true
      
      - name: creating pull request
        run: gh pr create -B ${{ github.ref }} -H nbconvert --title 'Comparison between nbconvert review of the article and the main article' --body 'Created by Github action'
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
